name: Publish GitHub release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          npm ci
          python -m pip install --upgrade pip build

      - name: Verify tag and package versions
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python - "$VERSION" <<'PY'
          import json
          import pathlib
          import re
          import sys
          import tomllib

          expected = sys.argv[1]
          package = json.loads(pathlib.Path("package.json").read_text())
          pyproject = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          init_text = pathlib.Path("jupyter_notebook_assistant/__init__.py").read_text()
          init_version = re.search(r'__version__\s*=\s*"([^"]+)"', init_text).group(1)
          versions = {
              "package.json": package["version"],
              "pyproject.toml": pyproject["project"]["version"],
              "__init__.py": init_version,
          }
          mismatches = {name: value for name, value in versions.items() if value != expected}
          if mismatches:
              raise SystemExit(f"Tag v{expected} does not match package versions: {mismatches}")
          print(f"Validated version {expected}")
          PY

      - name: Build extension and Python distributions
        run: |
          npm run build:prod
          python -m build

      - name: Build standalone installation ZIP
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="jupyter-notebook-assistant-${VERSION}"
          mkdir "$STAGE"
          rsync -a ./ "$STAGE"/ \
            --exclude .git \
            --exclude node_modules \
            --exclude dist \
            --exclude build \
            --exclude "$STAGE" \
            --exclude "${STAGE}.zip" \
            --exclude 'jupyter_notebook_assistant-*.whl'
          cp "dist/jupyter_notebook_assistant-${VERSION}-py3-none-any.whl" "$STAGE"/
          zip -r "${STAGE}.zip" "$STAGE"
          rm -rf "$STAGE"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Jupyter Notebook Assistant ${GITHUB_REF_NAME#v}" \
            --generate-notes \
            dist/* \
            "jupyter-notebook-assistant-${GITHUB_REF_NAME#v}.zip"
